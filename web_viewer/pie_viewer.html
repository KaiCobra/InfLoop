<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIE Bench Batch Viewer</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171b2d;
      --panel2: #1f2540;
      --line: #313956;
      --text: #ebefff;
      --muted: #a5afcf;
      --accent: #71c7ff;
      --accent2: #9ecb7f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }
    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      flex-wrap: wrap;
    }
    .title {
      font-size: 1rem;
      color: var(--accent);
      font-weight: 700;
      margin-right: 8px;
    }
    .ctrl {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.84rem;
    }
    select, button, input {
      background: #11162a;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.84rem;
    }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }
    .status {
      color: var(--muted);
      font-size: 0.8rem;
      margin-left: auto;
      max-width: 360px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .quick-grid {
      border-bottom: 1px solid var(--line);
      background: var(--panel2);
      padding: 10px 12px;
      overflow-x: auto;
      white-space: nowrap;
    }
    .quick-item {
      width: 220px;
      display: inline-block;
      margin-right: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #121831;
      cursor: pointer;
      vertical-align: top;
    }
    .quick-item.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
    .quick-head {
      padding: 6px 8px;
      font-size: 0.76rem;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: #17203f;
    }
    .quick-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    .quick-pair img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      display: block;
      background: #0c1020;
    }

    .main {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 0;
    }
    .side {
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      background: var(--panel);
    }
    .side-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .side-head input { width: 120px; }
    .case-list {
      overflow: auto;
      padding: 8px;
    }
    .case-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      background: #141a31;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .case-row.active { border-color: var(--accent); background: #1a2445; }
    .case-row .meta { color: var(--muted); font-size: 0.74rem; }

    .content {
      overflow: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(420px, 48%) 1fr;
      gap: 12px;
      min-height: 0;
      align-items: start;
    }
    .left-pane {
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 12px;
      min-height: 0;
    }
    .right-pane {
      min-height: 0;
    }
    .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #121830;
      overflow: hidden;
    }
    .card .head {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: #0a0e1d;
      display: block;
    }
    .case-meta {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 0.82rem;
      color: var(--muted);
      background: #121830;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .extras {
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: #121830;
    }
    .extras-head {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .extras-body {
      padding: 10px;
      display: grid;
      gap: 10px;
      grid-template-rows: auto auto auto;
    }
    pre {
      margin: 0;
      background: #0b0f20;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      max-height: 320px;
      overflow: auto;
      font-size: 0.75rem;
      color: #d7dffd;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .tree-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #0b0f20;
    }
    .folder-block {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .folder-title {
      padding: 6px 8px;
      font-size: 0.77rem;
      color: var(--accent);
      border-bottom: 1px solid var(--line);
      background: #11172f;
      font-weight: 600;
    }
    .file-list {
      padding: 6px;
      display: grid;
      gap: 5px;
    }
    .file-item {
      width: 100%;
      text-align: left;
      font-size: 0.75rem;
      padding: 6px 8px;
      border: 1px solid #2a3352;
      background: #0f152a;
      color: #dce4ff;
      border-radius: 6px;
    }
    .file-item:hover { border-color: var(--accent); }
    .file-tag {
      color: var(--muted);
      margin-left: 8px;
      font-size: 0.72rem;
    }
    .mask-groups {
      display: grid;
      gap: 12px;
    }
    .mask-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #0f1428;
    }
    .mask-row-title {
      color: var(--accent);
      font-size: 0.78rem;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .mask-grid {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 6px;
      scrollbar-width: thin;
    }
    .mask-grid > div {
      flex: 0 0 170px;
    }
    .mask-grid img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0a0e1d;
      cursor: pointer;
    }
    .mask-grid a {
      color: var(--muted);
      font-size: 0.72rem;
      text-decoration: none;
      word-break: break-all;
    }
    .muted { color: var(--muted); }
    .ok { color: var(--accent2); }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      cursor: zoom-out;
    }
    .lightbox img {
      max-width: 92vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }
    @media (max-width: 1200px) {
      .main { grid-template-columns: 1fr; }
      .side { max-height: 260px; border-right: 0; border-bottom: 1px solid var(--line); }
      .content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">PIE Bench Batch Viewer</div>
    <div class="ctrl">
      <span>資料夾</span>
      <select id="datasetSelect"></select>
    </div>
    <div class="ctrl">
      <span>類別</span>
      <select id="categorySelect"></select>
    </div>
    <div class="ctrl">
      <button id="prevBtn">上一筆</button>
      <button id="nextBtn">下一筆</button>
    </div>
    <div class="ctrl">
      <button id="reloadBtn">重新掃描</button>
    </div>
    <div class="status" id="statusText">初始化中…</div>
  </div>

  <div class="quick-grid" id="quickGrid"></div>

  <div class="main">
    <div class="side">
      <div class="side-head">
        <span class="muted">Case Filter</span>
        <input id="caseFilter" placeholder="例如 0000000001" />
      </div>
      <div class="case-list" id="caseList"></div>
    </div>

    <div class="content">
      <div class="left-pane">
        <div class="case-meta" id="caseMeta">
          <span>dataset: -</span>
          <span>category: -</span>
          <span>case: -</span>
        </div>
        <div class="card">
          <div class="head"><span>source.jpg</span><span class="ok" id="srcInfo"></span></div>
          <img id="sourceImg" src="" alt="source" />
        </div>
      
        <div class="card">
          <div class="head"><span>target.jpg</span><span class="ok" id="tgtInfo"></span></div>
          <img id="targetImg" src="" alt="target" />
        </div>
      </div>

      <div class="right-pane">
        <div class="extras">
          <div class="extras-head">
            <span class="muted">其他資訊（右側）</span>
            <span class="muted" id="extraHint"></span>
          </div>
          <div class="extras-body" id="extrasBody">
            <div>
              <div class="muted" style="margin-bottom:6px;">Attention Maps</div>
              <div class="mask-grid" id="maskGrid"></div>
            </div>
            <div class="tree-wrap" id="fileTreeWrap"></div>
            <pre id="filePreview">按下方檔案按鈕載入內容。</pre>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="preview" />
  </div>

  <script>
    const state = {
      datasets: [],
      dataset: '',
      categories: [],
      category: '',
      caseIds: [],
      caseId: '',
      casePayload: null,
    };

    const el = {
      datasetSelect: document.getElementById('datasetSelect'),
      categorySelect: document.getElementById('categorySelect'),
      caseList: document.getElementById('caseList'),
      quickGrid: document.getElementById('quickGrid'),
      statusText: document.getElementById('statusText'),
      caseMeta: document.getElementById('caseMeta'),
      sourceImg: document.getElementById('sourceImg'),
      targetImg: document.getElementById('targetImg'),
      srcInfo: document.getElementById('srcInfo'),
      tgtInfo: document.getElementById('tgtInfo'),
      caseFilter: document.getElementById('caseFilter'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      reloadBtn: document.getElementById('reloadBtn'),
      extrasBody: document.getElementById('extrasBody'),
      filePreview: document.getElementById('filePreview'),
      fileTreeWrap: document.getElementById('fileTreeWrap'),
      maskGrid: document.getElementById('maskGrid'),
      extraHint: document.getElementById('extraHint'),
      lightbox: document.getElementById('lightbox'),
      lightboxImg: document.getElementById('lightboxImg'),
    };

    async function api(path) {
      const res = await fetch(path);
      if (!res.ok) {
        const msg = await res.text();
        throw new Error(msg || `API error: ${res.status}`);
      }
      return res.json();
    }

    function setStatus(msg) {
      el.statusText.textContent = msg;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadDatasets() {
      const payload = await api('/api/datasets');
      state.datasets = payload.datasets || [];
      state.dataset = state.datasets.includes(state.dataset)
        ? state.dataset
        : (payload.default || state.datasets[0] || '');

      el.datasetSelect.innerHTML = state.datasets.map(name =>
        `<option value="${name}">${name}</option>`
      ).join('');
      el.datasetSelect.value = state.dataset;
    }

    async function loadCategories() {
      if (!state.dataset) return;
      const payload = await api(`/api/categories?dataset=${encodeURIComponent(state.dataset)}`);
      state.categories = payload.categories || [];
      state.category = state.categories.find(c => c.name === state.category)?.name || state.categories[0]?.name || '';

      el.categorySelect.innerHTML = state.categories.map(c => {
        const displayName = c.name === '__flat__' ? '(全部)' : c.name;
        return `<option value="${c.name}">${displayName} (${c.count})</option>`;
      }).join('');
      el.categorySelect.value = state.category;

      syncCaseIds();
      renderCaseList();
      renderQuickGrid();
    }

    function syncCaseIds() {
      const cat = state.categories.find(c => c.name === state.category);
      state.caseIds = cat?.case_ids || [];
      if (!state.caseIds.includes(state.caseId)) {
        state.caseId = state.caseIds[0] || '';
      }
    }

    function filteredCaseIds() {
      const q = el.caseFilter.value.trim();
      if (!q) return state.caseIds;
      return state.caseIds.filter(id => id.includes(q));
    }

    function renderCaseList() {
      const ids = filteredCaseIds();
      if (ids.length === 0) {
        el.caseList.innerHTML = '<div class="muted">沒有符合的 case</div>';
        return;
      }
      el.caseList.innerHTML = ids.map((id, idx) => {
        const active = id === state.caseId ? 'active' : '';
        return `
          <div class="case-row ${active}" data-case="${id}">
            <div>${id}</div>
            <div class="meta">#${idx + 1}</div>
          </div>
        `;
      }).join('');
    }

    function renderQuickGrid() {
      const ids = state.caseIds.slice(0, 160);
      if (ids.length === 0) {
        el.quickGrid.innerHTML = '<span class="muted">沒有可顯示結果</span>';
        return;
      }
      const isFlat = state.category === '__flat__';
      el.quickGrid.innerHTML = ids.map(id => {
        const base = isFlat
          ? `/outputs/outputs_loop_exp/${state.dataset}/${id}`
          : `/outputs/outputs_loop_exp/${state.dataset}/${state.category}/${id}`;
        const active = id === state.caseId ? 'active' : '';
        const label = isFlat ? id : `${state.category} / ${id}`;
        return `
          <div class="quick-item ${active}" data-case="${id}">
            <div class="quick-head">${label}</div>
            <div class="quick-pair">
              <img src="${base}/source.jpg" alt="source" loading="lazy" />
              <img src="${base}/target.jpg" alt="target" loading="lazy" />
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadCase() {
      if (!state.dataset || !state.category || !state.caseId) return;
      setStatus(`讀取 ${state.dataset} / ${state.category} / ${state.caseId} ...`);
      const payload = await api(
        `/api/case?dataset=${encodeURIComponent(state.dataset)}&category=${encodeURIComponent(state.category)}&case=${encodeURIComponent(state.caseId)}`
      );
      state.casePayload = payload;

      el.caseMeta.innerHTML = `
        <span>dataset: ${payload.dataset}</span>
        <span>category: ${payload.category === '__flat__' ? '(全部)' : payload.category}</span>
        <span>case: ${payload.case_id}</span>
        <span>masks: ${payload.mask_images.length}</span>
      `;

      el.sourceImg.src = payload.source;
      el.targetImg.src = payload.target;
      el.srcInfo.textContent = payload.source.split('/').slice(-2).join('/');
      el.tgtInfo.textContent = payload.target.split('/').slice(-2).join('/');

      el.filePreview.textContent = '按下方檔案按鈕載入內容。';
      el.maskGrid.innerHTML = '';
      const fileCount = payload.files_tree?.files?.length || 0;
      const folderCount = payload.files_tree?.folders?.length || 0;
      el.extraHint.textContent = `檔案 ${fileCount} 個，子資料夾 ${folderCount} 個`;
      buildFileTree();
      showMasks();

      renderCaseList();
      renderQuickGrid();
      setStatus(`已載入 ${payload.dataset} / ${payload.category} / ${payload.case_id}`);
    }

    function buildFileTree() {
      const payload = state.casePayload;
      if (!payload) {
        el.fileTreeWrap.innerHTML = '<div class="muted">無 case 資訊</div>';
        return;
      }

      const files = payload.files_tree?.files || [];
      if (files.length === 0) {
        el.fileTreeWrap.innerHTML = '<div class="muted">此 case 沒有可瀏覽檔案</div>';
        return;
      }

      const byFolder = new Map();
      for (const file of files) {
        const key = file.folder || '(root)';
        if (!byFolder.has(key)) byFolder.set(key, []);
        byFolder.get(key).push(file);
      }

      const folders = Array.from(byFolder.keys()).sort();
      el.fileTreeWrap.innerHTML = folders.map(folder => {
        const arr = byFolder.get(folder) || [];
        const buttons = arr.map(file => {
          const tag = `${file.type}${typeof file.size === 'number' ? ` · ${file.size}B` : ''}`;
          return `<button class="file-item" data-path="${file.path}" data-type="${file.type}">${escapeHtml(file.relative)}<span class="file-tag">${escapeHtml(tag)}</span></button>`;
        }).join('');
        return `
          <div class="folder-block">
            <div class="folder-title">${escapeHtml(folder)}</div>
            <div class="file-list">${buttons}</div>
          </div>
        `;
      }).join('');
    }

    async function openExtraFileByPath(filePath, fileType) {
      if (!filePath) return;
      const fileName = filePath.split('/').slice(-1)[0] || filePath;

      setStatus(`載入 ${fileName} ...`);
      let content = '';

      try {
        const filePayload = await api(`/api/file?path=${encodeURIComponent(filePath)}`);
        content = filePayload.content || '';
      } catch {
        const direct = await fetch(filePath);
        if (!direct.ok) {
          throw new Error(`no file: ${fileName}`);
        }
        content = await direct.text();
      }

      if (fileType === 'text' || fileName.endsWith('.json') || fileName.endsWith('.log') || fileName.endsWith('.txt')) {
        try {
          const obj = JSON.parse(content);
          el.filePreview.textContent = JSON.stringify(obj, null, 2);
        } catch {
          el.filePreview.textContent = content;
        }
      } else {
        el.filePreview.textContent = `此檔案非文字格式，已開新分頁:\n${filePath}`;
        window.open(filePath, '_blank');
      }

      setStatus(`已載入 ${fileName}`);
    }

    function showMasks() {
      const payload = state.casePayload;
      if (!payload) return;
      const groups = payload.mask_groups || [];
      if (groups.length === 0) {
        el.maskGrid.innerHTML = '<div class="muted">此 case 沒有 mask 圖片</div>';
        return;
      }

      el.maskGrid.innerHTML = `<div class="mask-groups">${groups.map(group => {
        const cards = (group.images || []).map(path => {
          const name = path.split('/').slice(-1)[0];
          return `
            <div>
              <img src="${path}" data-src="${path}" alt="${name}" loading="lazy" />
              <a href="${path}" target="_blank">${escapeHtml(name)}</a>
            </div>
          `;
        }).join('');

        return `
          <div class="mask-row">
            <div class="mask-row-title">${escapeHtml(group.folder || '(root)')}</div>
            <div class="mask-grid">${cards}</div>
          </div>
        `;
      }).join('')}</div>`;
    }

    function selectCase(caseId) {
      if (!caseId || caseId === state.caseId) return;
      state.caseId = caseId;
      loadCase().catch(err => setStatus(`錯誤: ${err.message}`));
    }

    function bindEvents() {
      el.datasetSelect.addEventListener('change', async () => {
        state.dataset = el.datasetSelect.value;
        state.category = '';
        state.caseId = '';
        try {
          await loadCategories();
          await loadCase();
        } catch (err) {
          setStatus(`錯誤: ${err.message}`);
        }
      });

      el.categorySelect.addEventListener('change', async () => {
        state.category = el.categorySelect.value;
        syncCaseIds();
        renderCaseList();
        renderQuickGrid();
        try {
          await loadCase();
        } catch (err) {
          setStatus(`錯誤: ${err.message}`);
        }
      });

      el.caseFilter.addEventListener('input', () => {
        renderCaseList();
      });

      el.caseList.addEventListener('click', (event) => {
        const row = event.target.closest('.case-row');
        if (!row) return;
        selectCase(row.dataset.case);
      });

      el.quickGrid.addEventListener('click', (event) => {
        const card = event.target.closest('.quick-item');
        if (!card) return;
        selectCase(card.dataset.case);
      });

      el.prevBtn.addEventListener('click', () => {
        const idx = state.caseIds.indexOf(state.caseId);
        if (idx > 0) selectCase(state.caseIds[idx - 1]);
      });

      el.nextBtn.addEventListener('click', () => {
        const idx = state.caseIds.indexOf(state.caseId);
        if (idx >= 0 && idx < state.caseIds.length - 1) selectCase(state.caseIds[idx + 1]);
      });

      el.reloadBtn.addEventListener('click', async () => {
        try {
          setStatus('重新掃描中...');
          await loadDatasets();
          await loadCategories();
          await loadCase();
        } catch (err) {
          setStatus(`錯誤: ${err.message}`);
        }
      });

      el.fileTreeWrap.addEventListener('click', (event) => {
        const button = event.target.closest('.file-item');
        if (!button) return;
        openExtraFileByPath(button.dataset.path, button.dataset.type).catch(err => setStatus(`錯誤: ${err.message}`));
      });

      [el.sourceImg, el.targetImg].forEach(img => {
        img.addEventListener('click', () => {
          if (!img.src) return;
          el.lightboxImg.src = img.src;
          el.lightbox.style.display = 'flex';
        });
      });

      el.maskGrid.addEventListener('click', (event) => {
        const img = event.target.closest('img');
        if (!img) return;
        el.lightboxImg.src = img.dataset.src;
        el.lightbox.style.display = 'flex';
      });

      el.lightbox.addEventListener('click', () => {
        el.lightbox.style.display = 'none';
        el.lightboxImg.src = '';
      });
    }

    async function init() {
      bindEvents();
      try {
        await loadDatasets();
        await loadCategories();
        await loadCase();
      } catch (err) {
        setStatus(`初始化失敗: ${err.message}`);
      }
    }

    init();
  </script>
</body>
</html>
